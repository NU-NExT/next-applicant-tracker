# Usage:
#   Development: docker compose --profile dev up --build
#   Production:  docker compose --profile prod up --build
services:
  localstack:
    image: localstack/localstack:3.8
    container_name: application_tracker_localstack
    profiles: ["dev"]
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-test}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-test}
      - AWS_DEFAULT_REGION=${AWS_REGION:-us-east-1}
      - LOCALSTACK_ACKNOWLEDGE_ACCOUNT_REQUIREMENT=1
    volumes:
      - ./localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 10s
      retries: 20

  localstack-init:
    image: amazon/aws-cli
    container_name: application_tracker_localstack_init
    profiles: ["dev"]
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-test}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-test}
      - AWS_DEFAULT_REGION=${AWS_REGION:-us-east-1}
    volumes:
      - ./backend/script:/scripts
    entrypoint: ["/bin/sh", "/scripts/init_localstack.sh"]

  db:
    image: postgres:15-alpine
    container_name: application_tracker_db
    profiles: ["dev"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-next-ats-db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-next-ats-db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend-dev:
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    container_name: application_tracker_backend_dev
    profiles: ["dev"]
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-next-ats-db}
      - STORAGE_BACKEND=${STORAGE_BACKEND:-s3}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://localstack:4566}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-test}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-test}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
      - LOCAL_STORAGE_PATH=${LOCAL_STORAGE_PATH:-/app/data}
      - COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID:-}
      - COGNITO_APP_CLIENT_ID=${COGNITO_APP_CLIENT_ID:-}
      - COGNITO_APP_CLIENT_SECRET=${COGNITO_APP_CLIENT_SECRET:-}
      - COGNITO_ADMIN_GROUP_NAME=${COGNITO_ADMIN_GROUP_NAME:-ADMIN}
      - COGNITO_AWS_REGION=${COGNITO_AWS_REGION:-}
      - COGNITO_AWS_ACCESS_KEY_ID=${COGNITO_AWS_ACCESS_KEY_ID:-}
      - COGNITO_AWS_SECRET_ACCESS_KEY=${COGNITO_AWS_SECRET_ACCESS_KEY:-}
      - COGNITO_AWS_SESSION_TOKEN=${COGNITO_AWS_SESSION_TOKEN:-}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
      - WATCHFILES_FORCE_POLLING=true
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      localstack:
        condition: service_healthy
      localstack-init:
        condition: service_completed_successfully
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend-dev:
    build:
      context: .
      dockerfile: frontend/Dockerfile.dev
    container_name: application_tracker_frontend_dev
    profiles: ["dev"]
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - VITE_ENVIRONMENT=${ENVIRONMENT:-development}
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8000}
      - VITE_COGNITO_DOMAIN=${VITE_COGNITO_DOMAIN:-}
      - VITE_COGNITO_CLIENT_ID=${VITE_COGNITO_CLIENT_ID:-}
      - VITE_COGNITO_REDIRECT_URI=${VITE_COGNITO_REDIRECT_URI:-http://localhost:3000/login}
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=100
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend-dev
    command: sh -c "[ -d node_modules/@tailwindcss/vite ] || npm install; npm run dev -- --host 0.0.0.0 --port 3000 --strictPort"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: application_tracker_backend
    profiles: ["prod"]
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DATABASE_URL=${DATABASE_URL}
      - STORAGE_BACKEND=s3
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}
      - COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID}
      - COGNITO_APP_CLIENT_ID=${COGNITO_APP_CLIENT_ID}
      - COGNITO_APP_CLIENT_SECRET=${COGNITO_APP_CLIENT_SECRET}
      - COGNITO_ADMIN_GROUP_NAME=${COGNITO_ADMIN_GROUP_NAME}
      - COGNITO_AWS_REGION=${COGNITO_AWS_REGION:-}
      - COGNITO_AWS_ACCESS_KEY_ID=${COGNITO_AWS_ACCESS_KEY_ID:-}
      - COGNITO_AWS_SECRET_ACCESS_KEY=${COGNITO_AWS_SECRET_ACCESS_KEY:-}
      - COGNITO_AWS_SESSION_TOKEN=${COGNITO_AWS_SESSION_TOKEN:-}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - VITE_ENVIRONMENT=${ENVIRONMENT:-production}
        - VITE_API_BASE_URL=${VITE_API_BASE_URL}
        - VITE_COGNITO_DOMAIN=${VITE_COGNITO_DOMAIN}
        - VITE_COGNITO_CLIENT_ID=${VITE_COGNITO_CLIENT_ID}
        - VITE_COGNITO_REDIRECT_URI=${VITE_COGNITO_REDIRECT_URI}
    container_name: application_tracker_frontend
    profiles: ["prod"]
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:
